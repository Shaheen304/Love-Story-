<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة خاصة ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.35); 
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            width: 100%;
            z-index: 10;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #d90429;
            font-size: 22px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        video {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-back {
            background-color: #ff4b2b;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            width: 85%;
        }

        .btn-back:hover {
            background-color: #ff416c;
            transform: scale(1.05);
        }

        /* قلوب متطايرة خلف الكارت */
        .heart {
            position: fixed;
            color: #ff4b2b;
            font-size: 22px;
            user-select: none;
            pointer-events: none;
            animation: moveUp 4s linear infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes moveUp {
            0% {
                transform: translateY(100vh) scale(0.8);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- العنوان الجديد -->
        <h2>بحبك يا أجمل  حاجه حصلت ليا في حياتي💗</h2>
        
        <video id="myVideo" controls autoplay loop style="margin-top: 10px;">
            <source src="video.mp4" type="video/mp4">
            المتصفح لا يدعم تشغيل الفيديو.
        </video>

        <!-- رابط الرجوع لصفحة الرسالة -->
        <a href="index.html" class="btn-back">الرجوع للرسالة 💌</a>
    </div>

    <script>
        // كود تشغيل الفيديو في وضع ملء الشاشة
        const video = document.getElementById('myVideo');
        video.addEventListener('play', () => {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) { /* Safari */
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) { /* IE11 */
                video.msRequestFullscreen();
            }
        });

        // كود القلوب المتطايرة
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
